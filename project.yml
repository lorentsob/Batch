name: Levain
options:
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: ""
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
targets:
  Levain:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Levain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lorentso.levain
        PRODUCT_NAME: Levain
        INFOPLIST_KEY_CFBundleDisplayName: Batch
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Levain/Info.plist
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
          SWIFT_COMPILATION_MODE: singlefile
          ONLY_ACTIVE_ARCH: YES
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
          SWIFT_COMPILATION_MODE: wholemodule
          ONLY_ACTIVE_ARCH: NO
  LevainTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LevainTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lorentso.levain.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Levain
  LevainUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LevainUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lorentso.levain.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Levain
    dependencies:
      - target: Levain
schemes:
  Levain:
    build:
      targets:
        Levain: all
        LevainTests: [test]
        LevainUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: LevainTests
        - name: LevainUITests
          randomExecutionOrder: true
    profile:
      config: Release
    archive:
      config: Release
