name: iOS Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Type of bump (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release-candidate:
    name: Create Release Candidate
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Bootstrap project
        run: |
          brew install xcodegen
          bash scripts/ci_bootstrap.sh

      # Pre-flight verify with no signing
      - name: Dry-run Build
        run: bash scripts/ci_release.sh --dry-run

      # Note: Signing and real export requires secrets (RISK-01)
      # This is where the real signing and upload steps would live.
      - name: Documentation Gap (Secrets)
        run: |
          echo "⚠️ Release Candidate logic stops here until signing secrets are provisioned."
          echo "See docs/release-secrets.md and docs/release-runbook.md for instructions."
