name: iOS CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: self-hosted

    env:
      # Override simulator name if the runner image ships a different model.
      # Check available sims with: xcrun simctl list devices available
      SIMULATOR_NAME: "iPhone 17 Pro"

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Verify Xcode version ──────────────────────────────────────────────
      - name: Verify Xcode
        run: xcodebuild -version

      # ── 3. Cache DerivedData ─────────────────────────────────────────────────
      # Keyed on Swift sources + project.yml so a cache hit means no recompile.
      # Every 20th run (run_number % 20 == 0) the key includes "clean" so the
      # cache is intentionally busted for a full clean build (avoids stale state).
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: /tmp/LevainDerivedCI
          key: deriveddata-${{ runner.os }}-${{ hashFiles('**/*.swift', 'project.yml') }}
          restore-keys: deriveddata-${{ runner.os }}-

      # ── 6. Bootstrap (generate project from project.yml) ─────────────────────
      - name: Bootstrap project
        run: bash scripts/ci_bootstrap.sh

      # ── 7. Build ─────────────────────────────────────────────────────────────
      # Use generic/platform=iOS Simulator so the build step succeeds even when
      # the named simulator device is not yet available (e.g. runner images that
      # haven't installed a runtime for the target OS). Compilation only needs
      # the SDK — a specific device is not required until the test step.
      - name: Build (no signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project Levain.xcodeproj \
            -scheme Levain \
            -configuration Debug \
            -derivedDataPath /tmp/LevainDerivedCI \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            build 2>&1 | tee /tmp/build.log | xcpretty --color

      # ── 6. List simulators (diagnostic) ─────────────────────────────────────
      - name: List available simulators
        run: xcrun simctl list devices available | grep -i iphone || true

      # ── 7. Test (solo su push a develop) ─────────────────────────────────────
      # Sulle PR verso develop eseguiamo solo il build. I test completi girano
      # solo sui push diretti a develop (tipicamente dopo il merge della PR).

      - name: Clean previous test results
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        run: rm -rf /tmp/LevainDerivedCI/Levain.xcresult

      - name: Run tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        run: |
          set -o pipefail
          xcodebuild \
            -project Levain.xcodeproj \
            -scheme Levain \
            -configuration Debug \
            -derivedDataPath /tmp/LevainDerivedCI \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" \
            -resultBundlePath /tmp/LevainDerivedCI/Levain.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee /tmp/test.log

      - name: Upload test results
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop' && always()
        uses: actions/upload-artifact@v4
        with:
          name: levain-xcresult-${{ github.run_number }}
          path: /tmp/LevainDerivedCI/Levain.xcresult
          retention-days: 14
          if-no-files-found: warn

      # ── 8. Upload build log on failure ───────────────────────────────────────
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: levain-build-log-${{ github.run_number }}
          path: /tmp/build.log
          retention-days: 7
          if-no-files-found: warn
