name: iOS CI

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
  pull_request:
    branches:
      - main
      - develop
      - "release/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    env:
      # Override simulator name if the runner image ships a different model.
      # Check available sims with: xcrun simctl list devices available
      SIMULATOR_NAME: "iPhone 17 Pro"

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode version ──────────────────────────────────────────────
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      # ── 3. Install XcodeGen ──────────────────────────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install xcpretty
        run: sudo gem install xcpretty

      # ── 4. Bootstrap (generate project from project.yml) ─────────────────────
      - name: Bootstrap project
        run: bash scripts/ci_bootstrap.sh

      # ── 5. Build ─────────────────────────────────────────────────────────────
      # Use generic/platform=iOS Simulator so the build step succeeds even when
      # the named simulator device is not yet available (e.g. runner images that
      # haven't installed a runtime for the target OS). Compilation only needs
      # the SDK — a specific device is not required until the test step.
      - name: Build (no signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project Levain.xcodeproj \
            -scheme Levain \
            -configuration Debug \
            -derivedDataPath /tmp/LevainDerivedCI \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            clean build 2>&1 | tee /tmp/build.log | xcpretty --color

      # ── 6. Boot simulator ────────────────────────────────────────────────────
      - name: List available simulators
        run: xcrun simctl list devices available | grep -i iphone || true

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "import sys,json; devs=json.load(sys.stdin)['devices']; [print(d['udid']) or exit() for runtime,devices in devs.items() for d in devices if d.get('name')=='$SIMULATOR_NAME' and d.get('isAvailable')]")
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      # ── 7. Test ──────────────────────────────────────────────────────────────
      - name: Run tests
        run: |
          xcodebuild \
            -project Levain.xcodeproj \
            -scheme Levain \
            -configuration Debug \
            -derivedDataPath /tmp/LevainDerivedCI \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
            -resultBundlePath /tmp/LevainDerivedCI/Levain.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee /tmp/test.log

      # ── 7. Upload xcresult for debugging failures ─────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: levain-xcresult-${{ github.run_number }}
          path: /tmp/LevainDerivedCI/Levain.xcresult
          retention-days: 14
          if-no-files-found: warn

      # ── 8. Upload build log on failure ───────────────────────────────────────
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: levain-build-log-${{ github.run_number }}
          path: /tmp/build.log
          retention-days: 7
          if-no-files-found: warn
