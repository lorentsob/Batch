# Le PR verso `main` sono riservate al maintainer (@lorentsob).
# Gli altri contributi devono usare `develop` come branch base.
name: PR base branch (main)

on:
  pull_request_target:
    types: [opened, reopened, edited]
    branches:
      - main

permissions:
  pull-requests: write
  issues: write

jobs:
  enforce-develop-for-contributors:
    if: github.event.pull_request.user.login != 'lorentsob'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = [
              'Questa PR punta a `main`, che in questo repo è riservato ai merge di release da parte del maintainer.',
              '',
              '**Apri una nuova pull request con base `develop`:**',
              '- nella PR, usa il menu del branch base e seleziona `develop`, oppure',
              '- chiudi questa PR e creane una nuova con base `develop`.',
              '',
              'Vedi [CONTRIBUTING.md](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/blob/main/CONTRIBUTING.md) per i dettagli.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              state: 'closed'
            });
